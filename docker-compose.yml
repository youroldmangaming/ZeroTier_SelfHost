services:
  zerotier:
    image: zyclonite/zerotier:1.14.0
    container_name: zerotier-controller
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - zerotier-data:/var/lib/zerotier-one
    healthcheck:
      test: ["CMD", "zerotier-cli", "status"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  zero-ui:
    image: dec0dos/zero-ui:latest
    container_name: zerotier-ui
    restart: unless-stopped
    depends_on:
      zerotier:
        condition: service_healthy
    network_mode: host
    volumes:
      - zero-ui-data:/app/data
      - zerotier-data:/var/lib/zerotier-one:ro
    environment:
      - ZU_CONTROLLER_ENDPOINT=http://localhost:9993/
      - ZU_SECURE_HEADERS=true
      - ZU_DEFAULT_USERNAME=${ZU_DEFAULT_USERNAME:-admin}
      - ZU_DEFAULT_PASSWORD=${ZU_DEFAULT_PASSWORD:-change_me_immediately}
      - ZU_SERVE_FRONTEND=true

volumes:
  zerotier-data:
    driver: local
  zero-ui-data:
    driver: local
